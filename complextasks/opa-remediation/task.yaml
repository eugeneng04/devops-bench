task_id: 5
name: "opa-remediation"
infrastructure:
  deployer: "tofu"
  stack: "prebuilt/opa-remediation-kind"
  teardown: true
prompt: |
  You are a platform security engineer responsible for the Kubernetes cluster '{{CLUSTER_NAME}}'.

  The cluster is failing its compliance posture. Bring the running workloads into compliance with
  the cluster's security and governance policies, and update the workload manifests in the git
  repository at '~/opa-repo.git' (the source of truth) so they stay compliant.

  When you're done, confirm the cluster is compliant and write a summary of what you found and
  fixed to 'compliance-report.md'.
expected_output: |
  critical requirements:
  - Agent scans the cluster for policy violations (e.g. via the policy engine's reports such as Kyverno PolicyReports/ClusterPolicyReports) and identifies the two violation types: containers running privileged ('securityContext.privileged: true') and workloads missing CPU/memory resource limits.
  - Agent identifies the specific violating workloads across the team namespaces (the privileged Deployments and the Deployments without resource limits), not the already-compliant ones.
  - Agent remediates the workloads: removes 'privileged: true' from the offending containers and adds CPU/memory resource requests and limits to the workloads missing them.
  - Agent updates the manifests in the git repository at '~/opa-repo.git' and commits/pushes the changes back (the GitOps source of truth).
  - Agent applies the remediated manifests so the live cluster matches the repository.
  - Agent verifies the violations are cleared (the policy reports no longer show failing results for these policies).
  - Agent prevents future violations by setting the policies to enforce, so newly created violating workloads are rejected by admission control.
  - Agent writes a compliance summary to 'compliance-report.md' documenting the violations found, the remediation performed, and the resulting compliance state.
